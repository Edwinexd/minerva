name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_call:

env:
  CARGO_TERM_COLOR: always
  SQLX_OFFLINE: true

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Build
        run: cargo build

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc -b

      - name: Build
        run: npm run build

  moodle-plugin:
    name: Moodle plugin
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: moodle-plugin/local/minerva
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.1"

      - name: Syntax check
        run: find . -name '*.php' -exec php -l {} + | (! grep -v 'No syntax errors')

      - name: Install Moodle coding standards
        run: |
          composer global config allow-plugins.dealerdirect/phpcodesniffer-composer-installer true
          composer global require moodlehq/moodle-cs

      - name: Code style
        run: |
          PHPCS="$(composer global config home)/vendor/bin/phpcs"
          "$PHPCS" --standard=moodle --extensions=php .

  emdash-check:
    name: Ban emdashes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for emdashes
        run: |
          if grep -rn $'\xe2\x80\x94' --include='*.rs' --include='*.ts' --include='*.tsx' --include='*.toml' --include='*.yml' --include='*.yaml' --include='*.md' --include='*.sql' --include='*.php' .; then
            echo "::error::Emdashes found! Use -- or a hyphen instead."
            exit 1
          fi
