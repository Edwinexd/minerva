name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always
  SQLX_OFFLINE: true

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Build
        run: cargo build

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc -b

      - name: Build
        run: npm run build

  emdash-check:
    name: Ban emdashes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for emdashes
        run: |
          if grep -rn $'\xe2\x80\x94' --include='*.rs' --include='*.ts' --include='*.tsx' --include='*.toml' --include='*.yml' --include='*.yaml' --include='*.md' --include='*.sql' .; then
            echo "::error::Emdashes found! Use -- or a hyphen instead."
            exit 1
          fi
