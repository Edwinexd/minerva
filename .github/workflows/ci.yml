name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_call:

env:
  CARGO_TERM_COLOR: always
  SQLX_OFFLINE: true

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Build
        run: cargo build

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc -b

      - name: Build
        run: npm run build

  moodle-plugin:
    name: Moodle plugin
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: moodle-plugin/local/minerva
    steps:
      - uses: actions/checkout@v6

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.1"

      - name: Syntax check
        run: find . -name '*.php' -exec php -l {} + | (! grep -v 'No syntax errors')

      - name: Install Moodle coding standards
        run: |
          composer global config allow-plugins.dealerdirect/phpcodesniffer-composer-installer true
          composer global require moodlehq/moodle-cs

      - name: Code style
        run: |
          PHPCS="$(composer global config home)/vendor/bin/phpcs"
          "$PHPCS" --standard=moodle --extensions=php .

  apache:
    name: Apache (Lua + vhost configtest)
    # Run inside a Debian container so apt package names match the prod
    # host (libapache2-mod-lua, libapache2-mod-shib2). Ubuntu 24.04 ships
    # mod_lua bundled differently and would skew the test.
    runs-on: ubuntu-latest
    container: debian:bookworm
    steps:
      - uses: actions/checkout@v6

      - name: Install lua + apache + mods
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            lua5.4 apache2 libapache2-mod-lua libapache2-mod-shib

      - name: Lua syntax + unit tests
        env:
          LUA: lua5.4
        run: bash apache/test/run.sh

      - name: Stage minerva apache config in this runner
        run: |
          install -d -m 0750 -o root -g www-data /etc/apache2/secrets
          # configtest just needs the file to exist; the value is unused here.
          echo dummy > /etc/apache2/secrets/minerva-hmac
          chown root:www-data /etc/apache2/secrets/minerva-hmac
          chmod 0640 /etc/apache2/secrets/minerva-hmac

          install -d -m 0755 /etc/apache2/lua
          install -m 0644 apache/minerva-ext-auth.lua /etc/apache2/lua/minerva-ext-auth.lua

          # Drop the Debian default site so our vhost is the only one and any
          # name conflict surfaces immediately.
          rm -f /etc/apache2/sites-enabled/000-default.conf
          install -m 0644 apache/minerva-app.conf /etc/apache2/sites-enabled/minerva-app.conf

          # Same mods as prod.
          a2enmod ssl proxy proxy_http proxy_wstunnel rewrite headers lua shib >/dev/null

      - name: apache2ctl configtest
        run: apache2ctl configtest

  emdash-check:
    name: Ban emdashes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check for emdashes
        run: |
          if grep -rn $'\xe2\x80\x94' --include='*.rs' --include='*.ts' --include='*.tsx' --include='*.toml' --include='*.yml' --include='*.yaml' --include='*.md' --include='*.sql' --include='*.php' .; then
            echo "::error::Emdashes found! Use -- or a hyphen instead."
            exit 1
          fi
