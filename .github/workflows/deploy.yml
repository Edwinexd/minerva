name: Deploy to Production

on:
  workflow_run:
    workflows: [Docker]
    branches: [master]
    types: [completed]
  repository_dispatch:
    types: [deploy]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (e.g. master, sha-abc1234, v1.0.0)"
        required: false
        default: "latest"

jobs:
  build-plugin:
    name: Build Moodle plugin
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Package Moodle plugin
        run: |
          cd moodle-plugin/local
          zip -r "$GITHUB_WORKSPACE/local_minerva.zip" minerva/

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v7
        with:
          name: moodle-plugin
          path: local_minerva.zip

  deploy:
    needs: [build-plugin]
    runs-on: ubuntu-latest
    environment: prod
    env:
      IMAGE_TAG: ${{ github.event.client_payload.tag || inputs.image_tag || 'latest' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set image tag in kustomization
        # Rewrites every `newTag:` line in the prod overlay so all five
        # service images (minerva, minerva-embedder, minerva-reranker,
        # minerva-worker, minerva-scheduler) roll forward together to
        # the same tag. Pre-split this only had one tag to set; now
        # the `sed` matches all of them.
        run: |
          cd k8s/overlays/prod
          sed -i "s/newTag: .*/newTag: ${{ env.IMAGE_TAG }}/" kustomization.yaml
          echo "Image tags after rewrite:"
          grep -E "name:|newTag:" kustomization.yaml

      - name: Install WireGuard
        run: sudo apt-get update && sudo apt-get install -y wireguard

      - name: Setup WireGuard
        run: |
          echo "${{ secrets.WIREGUARD_CONFIG }}" | sed "/^\[Interface\]/a PrivateKey = ${{ secrets.WIREGUARD_PRIVATE_KEY }}" | sudo tee /etc/wireguard/wg0.conf
          sudo chmod 600 /etc/wireguard/wg0.conf
          sudo wg-quick up wg0

      - name: Setup SSH tunnel
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan minerva.dsv.su.se >> ~/.ssh/known_hosts 2>/dev/null
          ssh -fN -L 6443:127.0.0.1:6443 ci@minerva.dsv.su.se

      - name: Setup kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Install kubectl
        uses: azure/setup-kubectl@v5

      - name: Create k8s secrets file
        run: |
          echo "${{ secrets.K8S_SECRETS }}" | base64 -d > k8s/overlays/prod/secrets.yaml

      - name: Deploy to Kubernetes
        # Roll-out order: data layer first (postgres + qdrant must be
        # healthy for any of the apps), then the model servers
        # (embedder + reranker) so workers + api can connect on first
        # request, then worker + scheduler (which depend on the model
        # servers), then the api last (so a chat request never
        # arrives before its retrieval pipeline is up).
        #
        # `kubectl apply -k` creates / updates all five Deployments in
        # one shot; the rollout-restarts then force a new ReplicaSet
        # for each existing deployment so a deploy with unchanged
        # manifests but a new image still cycles the pods.
        run: |
          echo "Deploying image tag: ${{ env.IMAGE_TAG }}"
          kubectl apply -k k8s/overlays/prod

          # Wait for the data layer; everything else depends on it.
          kubectl rollout status deployment/postgres -n minerva --timeout=120s
          kubectl rollout status deployment/qdrant -n minerva --timeout=120s

          # Restart + wait for the model servers.
          kubectl rollout restart deployment/minerva-embedder -n minerva
          kubectl rollout restart deployment/minerva-reranker -n minerva
          kubectl rollout status deployment/minerva-embedder -n minerva --timeout=300s
          kubectl rollout status deployment/minerva-reranker -n minerva --timeout=300s

          # Restart + wait for the workers (they call the model servers).
          kubectl rollout restart deployment/minerva-worker -n minerva
          kubectl rollout restart deployment/minerva-scheduler -n minerva
          kubectl rollout status deployment/minerva-worker -n minerva --timeout=300s
          kubectl rollout status deployment/minerva-scheduler -n minerva --timeout=300s

          # Api last so user traffic never hits an under-warm
          # retrieval path. The chat path goes
          #   api -> embedder.embed_query (gRPC)
          #   api -> qdrant.search
          #   api -> reranker.rerank (gRPC)
          # so embedder + reranker must be up before the api accepts
          # the first chat request after a rollout.
          kubectl rollout restart deployment/minerva-app -n minerva
          kubectl rollout status deployment/minerva-app -n minerva --timeout=300s

      - name: Deploy Apache config + Lua
        # Apache vhost / Lua hook on the prod host, deployed via the same
        # SSH session. ci can write the two files directly (see
        # apache/install/bootstrap.sh (group `apache-deploy` + chmod 0664)
        # and a systemd path unit (minerva-apache-reload.path) watches the
        # files, runs configtest, and reloads apache. ci never needs sudo.
        run: |
          set -euo pipefail
          HOST=ci@minerva.dsv.su.se
          # Snapshot the reload-stamp before pushing so we can detect when
          # the path-unit-triggered service has run.
          BEFORE=$(ssh "$HOST" 'cat /var/log/minerva-apache-reload.stamp 2>/dev/null || echo never')
          AFTER="$BEFORE"
          echo "stamp before: $BEFORE"

          # Overwrite contents in place; the bootstrap-set 0664 root:apache-deploy
          # perms on the targets are preserved across scp updates.
          scp apache/minerva-app.conf      "$HOST:/etc/apache2/sites-enabled/minerva-app.conf"
          scp apache/minerva-ext-auth.lua  "$HOST:/etc/apache2/lua/minerva-ext-auth.lua"

          # Wait up to ~20s for the path-watcher's service to fire. If
          # nothing changed (e.g. files identical to what was already
          # there), the stamp won't update and that's fine.
          for i in $(seq 1 20); do
            AFTER=$(ssh "$HOST" 'cat /var/log/minerva-apache-reload.stamp 2>/dev/null || echo never')
            [[ "$AFTER" != "$BEFORE" ]] && break
            sleep 1
          done

          if [[ "$AFTER" == "$BEFORE" ]]; then
            echo "::notice::stamp unchanged; either files were identical or the reload service didn't fire (check journalctl -u minerva-apache-reload)"
          else
            echo "stamp after:  $AFTER"
          fi

      - name: Teardown
        if: always()
        run: |
          pkill -f "ssh -fN -L 6443" || true
          sudo wg-quick down wg0 || true
