name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml

  release:
    name: Create release
    runs-on: ubuntu-latest
    needs: [ci]
    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Package Moodle plugins
        run: |
          cd moodle-plugin/local
          zip -r "$GITHUB_WORKSPACE/local_minerva-${{ steps.version.outputs.version }}.zip" minerva/
          cd "$GITHUB_WORKSPACE/moodle-plugin/mod"
          zip -r "$GITHUB_WORKSPACE/mod_minerva-${{ steps.version.outputs.version }}.zip" minerva/

      - name: Generate release notes
        id: notes
        run: |
          cat > notes.md << 'NOTES'
          ## Docker Image

          ```
          docker pull ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}
          ```

          ## Moodle Plugin

          Download both plugin zips below:
          - `local_minerva` -- extract into Moodle `local/` directory (admin settings, enrolment sync, scheduled tasks)
          - `mod_minerva` -- extract into Moodle `mod/` directory (activity module for course pages)

          Then run the Moodle upgrade.

          ## Setup

          1. Deploy the Minerva Docker image
          2. Install both Moodle plugins and run the upgrade
          3. Set the Minerva URL in Site Administration > Plugins > Minerva AI Assistant
          4. In the teacher course page, go to **API Keys** tab and create a key
          5. Link the Moodle course using the API key via Minerva settings in the course nav
          6. Add the "Minerva AI Assistant" activity to the course page
          NOTES

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: notes.md
          generate_release_notes: true
          append_body: true
          files: |
            local_minerva-${{ steps.version.outputs.version }}.zip
            mod_minerva-${{ steps.version.outputs.version }}.zip
