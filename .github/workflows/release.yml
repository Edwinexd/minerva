name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml

  release:
    name: Create release
    runs-on: ubuntu-latest
    needs: [ci]
    steps:
      - uses: actions/checkout@v6

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Package Moodle plugin
        run: |
          cd moodle-plugin/local
          zip -r "$GITHUB_WORKSPACE/local_minerva-${{ steps.version.outputs.version }}.zip" minerva/

      - name: Generate release notes
        id: notes
        run: |
          cat > notes.md << 'NOTES'
          ## Docker Image

          ```
          docker pull ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}
          ```

          ## Moodle Plugin

          Download `local_minerva-${{ steps.version.outputs.version }}.zip` below and extract it into your Moodle `local/` directory, then run the Moodle upgrade.

          ## Setup

          1. Deploy the Minerva Docker image
          2. In the teacher course page, go to **API Keys** tab and create a key
          3. Install the Moodle plugin and link your course using the API key
          NOTES

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: notes.md
          generate_release_notes: true
          append_body: true
          files: |
            local_minerva-${{ steps.version.outputs.version }}.zip
