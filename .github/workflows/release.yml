name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml

  release:
    name: Create release
    runs-on: ubuntu-latest
    needs: [ci]
    steps:
      - uses: actions/checkout@v6

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Package Moodle plugin
        run: |
          cd moodle-plugin/local
          zip -r "$GITHUB_WORKSPACE/local_minerva-${{ steps.version.outputs.version }}.zip" minerva/

      - name: Generate release notes
        id: notes
        run: |
          cat > notes.md << 'NOTES'
          ## Docker Image

          ```
          docker pull ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}
          ```

          ## Moodle Plugin

          The sync plugin (`local_minerva`) is available at
          [Edwinexd/moodle-local_minerva](https://github.com/Edwinexd/moodle-local_minerva)
          and is also attached as a zip below. Extract into Moodle `local/` directory and run
          the Moodle upgrade.

          Chat integration uses LTI 1.3 -- no activity module plugin required.

          ## Setup

          1. Deploy the Minerva Docker image
          2. Install the Moodle `local_minerva` plugin and run the upgrade
          3. Set the Minerva URL in Site Administration > Plugins > Minerva AI Assistant
          4. In the teacher course page, go to **API Keys** tab and create a key
          5. Link the Moodle course using the API key via Minerva settings in the course nav
          6. Add Minerva as an LTI 1.3 External Tool in the course
          NOTES

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: notes.md
          generate_release_notes: true
          append_body: true
          files: |
            local_minerva-${{ steps.version.outputs.version }}.zip
