name: Sync Moodle Plugin

on:
  push:
    branches: [master]
    paths:
      - "moodle-plugin/local/minerva/**"

jobs:
  sync:
    name: Sync to moodle-local_minerva
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Push plugin to target repo
        run: |
          cd moodle-plugin/local/minerva

          git init --initial-branch=master
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A
          git commit -m "Sync from Edwinexd/minerva@${GITHUB_SHA::7}"

          git remote add target "https://x-access-token:${TOKEN}@github.com/Edwinexd/moodle-local_minerva.git"
          git push target master --force
        env:
          TOKEN: ${{ secrets.MOODLE_SYNC_TOKEN }}
