name: Fetch Transcripts

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

# Serialise runs. After the first Daisy sync the queue can hold
# thousands of pending transcripts; one slow hourly pass can spill
# past 60 min and the next cron tick would otherwise fire a second
# python process against the same SU credentials, racing for the
# same pending rows.
concurrency:
  group: fetch-transcripts
  cancel-in-progress: false

jobs:
  fetch-transcripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests git+https://github.com/Edwinexd/dsv-wrapper.git

      - name: Fetch and submit transcripts
        env:
          MINERVA_API_URL: https://minerva.dsv.su.se
          MINERVA_SERVICE_API_KEY: ${{ secrets.MINERVA_SERVICE_API_KEY }}
          SU_USERNAME: ${{ secrets.SU_USERNAME }}
          SU_PASSWORD: ${{ secrets.SU_PASSWORD }}
        run: python scripts/fetch_transcripts.py
