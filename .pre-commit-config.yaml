repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=500"]

  - repo: local
    hooks:
      - id: ban-emdashes
        name: ban emdashes
        entry: bash -c 'if grep -Pn "\xe2\x80\x94" "$@" --; then echo "Emdashes found! Use -- or a hyphen instead."; exit 1; fi'
        language: system
        types: [text]
        exclude: (\.lock|node_modules|target|dist|\.gen\.)

      - id: cargo-check
        name: cargo check
        entry: bash -c 'cd backend && cargo check'
        language: system
        pass_filenames: false
        files: \.rs$|Cargo\.toml$

      - id: cargo-clippy
        name: cargo clippy
        entry: bash -c 'cd backend && cargo clippy -- -D warnings'
        language: system
        pass_filenames: false
        files: \.rs$|Cargo\.toml$
