repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        # k8s manifests bundle several objects per file with `---`
        # separators (e.g. observability/*.yaml: SA + Role + Deploy + Svc).
        args: ["--allow-multiple-documents"]
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=500"]

  - repo: local
    hooks:
      - id: migrations-immutable
        name: migrations are immutable once committed
        # Migration files in backend/migrations/ are content-hashed by sqlx
        # and checked against `_sqlx_migrations` on every app startup.
        # Editing one after it has been applied to a deployed database
        # breaks the next rollout (sqlx refuses to start with "migration N
        # was previously applied but has been modified"). The correct fix
        # is always additive: write a new migration. This hook blocks any
        # modification to existing migration files; only newly-added (A)
        # files pass.
        entry: bash scripts/check-migrations-immutable.sh
        language: system
        pass_filenames: false
        always_run: true

      - id: validate-dashboards
        name: validate grafana dashboards
        # Grafana dashboards under k8s/base/observability/dashboards/ are
        # provisioned from disk; a malformed one (bad JSON, overlapping
        # panels, a row that doesn't tile to the full 24-col grid, a typo'd
        # datasource uid, a file missing from the configMapGenerator) ships
        # silently and just fails to render. This script is the build-time
        # error. pass_filenames: false because it globs the dashboards dir
        # itself (needed for the cross-file uid + kustomization checks).
        entry: python3 scripts/validate-dashboards.py
        language: system
        pass_filenames: false
        files: ^k8s/base/observability/(dashboards/.*\.json|kustomization\.yaml)$

      - id: ban-emdashes
        name: ban emdashes
        # Uses perl for portability: BSD grep on macOS has no -P, and `bash -c '...' "$@"`
        # drops the first arg into $0, so the original grep-based hook silently passed.
        # Matches the em dash as raw UTF-8 bytes (0xE2 0x80 0x94) to avoid Perl encoding setup.
        entry: 'perl -ne ''if (/\xe2\x80\x94/) { print STDERR "$ARGV:$.: $_"; $found = 1 } END { exit($found ? 1 : 0) }'''
        language: system
        types: [text]
        # backend/migrations/ is excluded because migrations are immutable
        # once applied (see `migrations-immutable` above); pre-existing
        # emdashes in historical migration files cannot be cleaned up
        # without breaking every deployed DBs sqlx checksum check.
        exclude: (\.lock|node_modules|target|dist|\.gen\.|^backend/migrations/.*\.sql$)

      - id: ban-ux-glyphs
        name: ban UX glyphs (emoji / arrows / dingbats)
        # Emojis and arrow / dingbat code points have no business in source.
        # Use a lucide-react icon for UI affordances and ASCII (`->`, `=>`) in
        # comments. Latin letters with diacritics (Swedish locale files) and
        # box-drawing in markdown trees stay legal; em-dash has its own hook.
        # Frontend `.ts`/`.tsx` is *also* covered by an ESLint
        # `no-restricted-syntax` rule (in `frontend/eslint.config.js`) so the
        # IDE underlines violations in real time; this hook is the safety net
        # for the rest of the tree (Rust, markdown, scripts, apache vhost).
        entry: python3 scripts/check-ban-ux-glyphs.py
        language: system
        types: [text]
        # Same carve-out as ban-emdashes: applied migrations are content-hashed
        # and can't be retro-cleaned. The fastembed model cache and Python
        # venvs are downloaded artifacts, not source. .gen.* files are
        # codegen output.
        exclude: (\.lock|node_modules|target|dist|\.gen\.|^backend/migrations/.*\.sql$|^backend/\.fastembed_cache/|/\.venv-play-ingest/)

      - id: ban-double-dash
        name: ban space-dash-dash-space
        # Banned because LLMs reach for it as an em-dash workaround, which
        # is just as much of an LLM tell as the em dash itself.
        #
        # Pattern: a line containing space-dash-dash-space, BUT only if some
        # non-whitespace char appears before the dashes on the same line.
        # That carve-out keeps genuine indented SQL/Lua comments (e.g.
        # four-space-indented dash-dash-foo) legal while still catching inline
        # comments after code, mid-prose dashes inside comments, and any
        # space-dash-dash-space inside string literals.
        # Forms still allowed: postfix decrement, double-dash flags, etc.
        # (anything without spaces around the dashes).
        # YAML is excluded because cargo/CI invocations legitimately use the
        # end-of-options separator.
        # backend/migrations/ is excluded for the same reason as
        # ban-emdashes: applied migrations are content-hashed and immutable,
        # so historical occurrences cannot be retro-cleaned.
        # Hex escape for the space char keeps this hook config itself clean.
        entry: 'perl -ne ''if (/\S.*\x20--\x20/) { print STDERR "$ARGV:$.: $_"; $found = 1 } END { exit($found ? 1 : 0) }'''
        language: system
        types: [text]
        exclude: (\.lock|\.ya?ml$|node_modules|target|dist|\.gen\.|^backend/migrations/.*\.sql$)

      - id: tsc-check
        name: tsc check
        # `tsc -b` type-checks the app (tsconfig.app.json), which excludes the
        # test files so the production build stays free of vitest/jsdom types.
        # The second invocation type-checks the test suite (src + tests with
        # the vitest/jest-dom globals) via the standalone tsconfig.test.json.
        entry: bash -c 'cd frontend && npx tsc -b && npx tsc -p tsconfig.test.json'
        language: system
        pass_filenames: false
        files: \.(ts|tsx)$

      - id: eslint-check
        name: eslint check
        # `--max-warnings 0` so warnings fail the hook the same way
        # errors do; the previous setup had eslint only run on
        # demand via `npm run lint`, so new lint regressions could
        # slip into a commit (rules-of-hooks errors did in the
        # past). Triggered whenever any frontend source / config
        # file changes, regardless of which one, because lint state
        # is cross-file (a re-export break in A flags B).
        entry: bash -c 'cd frontend && npx eslint . --max-warnings 0'
        language: system
        pass_filenames: false
        files: ^frontend/(src/.*\.(ts|tsx|js|jsx)|package(-lock)?\.json|eslint\.config\.(js|ts|mjs)|tsconfig.*\.json)$

      - id: vitest-a11y
        name: vitest accessibility tests
        # Renders components into jsdom and runs axe-core (WCAG 2.2 AA tags)
        # against them. Static jsx-a11y lint (eslint-check) catches markup
        # smells; this catches violations only visible in the rendered tree.
        # Color-contrast lives in the CI-only pa11y job, which uses a real
        # browser (jsdom can't compute layout/contrast). Triggered on any
        # frontend source change since a11y state is cross-file.
        entry: bash -c 'cd frontend && npx vitest run'
        language: system
        pass_filenames: false
        files: ^frontend/(src/.*\.(ts|tsx)|package(-lock)?\.json|vite(st)?\.config\.ts|tsconfig.*\.json)$

      - id: cargo-fmt
        name: cargo fmt
        entry: bash -c 'cd backend && cargo fmt --all -- --check'
        language: system
        pass_filenames: false
        files: \.rs$|Cargo\.toml$

      - id: cargo-check
        name: cargo check
        # SQLX_OFFLINE forces sqlx macros to use the committed `backend/.sqlx/`
        # cache, so any new/modified query that hasn't been `cargo sqlx prepare`d
        # will fail here instead of going unnoticed until CI.
        entry: bash -c 'cd backend && SQLX_OFFLINE=true cargo check'
        language: system
        pass_filenames: false
        files: \.rs$|Cargo\.toml$

      - id: cargo-clippy
        name: cargo clippy
        # --all-targets matches CI's invocation; without it clippy skips
        # the test target and misses lints like `items_after_test_module`
        # (a test module followed by non-test items in the same file)
        # that only fire when the test build runs.
        entry: bash -c 'cd backend && SQLX_OFFLINE=true cargo clippy --all-targets -- -D warnings'
        language: system
        pass_filenames: false
        files: \.rs$|Cargo\.toml$

      - id: phpcs-moodle
        name: phpcs moodle
        entry: bash -c 'PHPCS="$(composer global config home 2>/dev/null)/vendor/bin/phpcs" && "$PHPCS" --standard=moodle --extensions=php moodle-plugin/local/minerva/'
        language: system
        pass_filenames: false
        files: \.php$
