repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=500"]

  - repo: local
    hooks:
      - id: ban-emdashes
        name: ban emdashes
        # Uses perl for portability: BSD grep on macOS has no -P, and `bash -c '...' "$@"`
        # drops the first arg into $0, so the original grep-based hook silently passed.
        # Matches the em dash as raw UTF-8 bytes (0xE2 0x80 0x94) to avoid Perl encoding setup.
        entry: 'perl -ne ''if (/\xe2\x80\x94/) { print STDERR "$ARGV:$.: $_"; $found = 1 } END { exit($found ? 1 : 0) }'''
        language: system
        types: [text]
        exclude: (\.lock|node_modules|target|dist|\.gen\.)

      - id: tsc-check
        name: tsc check
        entry: bash -c 'cd frontend && npx tsc -b'
        language: system
        pass_filenames: false
        files: \.(ts|tsx)$

      - id: cargo-fmt
        name: cargo fmt
        entry: bash -c 'cd backend && cargo fmt --all -- --check'
        language: system
        pass_filenames: false
        files: \.rs$|Cargo\.toml$

      - id: cargo-check
        name: cargo check
        # SQLX_OFFLINE forces sqlx macros to use the committed `backend/.sqlx/`
        # cache, so any new/modified query that hasn't been `cargo sqlx prepare`d
        # will fail here instead of going unnoticed until CI.
        entry: bash -c 'cd backend && SQLX_OFFLINE=true cargo check'
        language: system
        pass_filenames: false
        files: \.rs$|Cargo\.toml$

      - id: cargo-clippy
        name: cargo clippy
        entry: bash -c 'cd backend && SQLX_OFFLINE=true cargo clippy -- -D warnings'
        language: system
        pass_filenames: false
        files: \.rs$|Cargo\.toml$

      - id: phpcs-moodle
        name: phpcs moodle
        entry: bash -c 'PHPCS="$(composer global config home 2>/dev/null)/vendor/bin/phpcs" && "$PHPCS" --standard=moodle --extensions=php moodle-plugin/local/minerva/'
        language: system
        pass_filenames: false
        files: \.php$
