repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=500"]

  - repo: local
    hooks:
      - id: ban-emdashes
        name: ban emdashes
        entry: bash -c 'if grep -Pn "\xe2\x80\x94" "$@" --; then echo "Emdashes found! Use -- or a hyphen instead."; exit 1; fi'
        language: system
        types: [text]
        exclude: (\.lock|node_modules|target|dist|\.gen\.)

      - id: tsc-check
        name: tsc check
        entry: bash -c 'cd frontend && npx tsc -b'
        language: system
        pass_filenames: false
        files: \.(ts|tsx)$

      - id: cargo-fmt
        name: cargo fmt
        entry: bash -c 'cd backend && cargo fmt --all -- --check'
        language: system
        pass_filenames: false
        files: \.rs$|Cargo\.toml$

      - id: cargo-check
        name: cargo check
        entry: bash -c 'cd backend && cargo check'
        language: system
        pass_filenames: false
        files: \.rs$|Cargo\.toml$

      - id: cargo-clippy
        name: cargo clippy
        entry: bash -c 'cd backend && cargo clippy -- -D warnings'
        language: system
        pass_filenames: false
        files: \.rs$|Cargo\.toml$

      - id: phpcs-moodle
        name: phpcs moodle
        entry: bash -c 'PHPCS="$(composer global config home 2>/dev/null)/vendor/bin/phpcs" && "$PHPCS" --standard=moodle --extensions=php moodle-plugin/local/minerva/ moodle-plugin/mod/minerva/'
        language: system
        pass_filenames: false
        files: \.php$
