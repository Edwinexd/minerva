# Minerva Apache vhost.
#
# Two parallel auth paths feed the same backend (port 30090):
#
#   1. Shibboleth: default. Apache mod_shib enforces an SU/DSV session and
#      injects `eppn`/`displayName` headers via ShibUseHeaders.
#
#   2. External-auth: opt-in for invited non-SU collaborators. An admin-
#      minted JWT cookie (`minerva_ext`) causes mod_rewrite to re-route
#      the request through an internal `/__ext_proxy__/` URI prefix that
#      has its own LocationMatch with no Shib enforcement. mod_lua there
#      validates the cookie's HMAC + expiry against the secret in
#      /etc/apache2/secrets/minerva-hmac (mirror of MINERVA_HMAC_SECRET).
#      The backend further enforces revocation via the JTI in the DB.
#
# Why the URI-prefix dance? `<If>` blocks inside `<Location />` would be
# cleaner, but they break Apache's Location merging for the carve-outs
# (/api/health, /assets, /lti, etc.) -- all carve-outs got Shib-redirected
# when `<If>` was used. The internal-prefix trick keeps merging predictable.
#
# See apache/minerva-ext-auth.lua and apache/README.md.

<VirtualHost *:80>
    ServerName minerva.dsv.su.se
    Redirect permanent / https://minerva.dsv.su.se/
</VirtualHost>

<VirtualHost *:443>
    ServerName minerva.dsv.su.se
    ServerAlias minerva
    SSLEngine On

    ErrorLog ${APACHE_LOG_DIR}/minerva-error.log
    CustomLog ${APACHE_LOG_DIR}/minerva-access.log combined

    ProxyPreserveHost On
    ProxyRequests Off

    # Defense in depth: never trust client-supplied identity headers.
    # mod_shib (for SU users) and our Lua hook (for external users) are
    # the only legitimate sources -- both run after this `early` fixup.
    RequestHeader unset eppn early
    RequestHeader unset displayName early
    RequestHeader unset X-Minerva-Ext-Jti early

    # Shibboleth handler.
    <Location /Shibboleth.sso>
        SetHandler shib
    </Location>

    RewriteEngine On

    # External-auth bypass: cookie-bearing requests to Shib-protected paths
    # get rewritten to /__ext_proxy__/<original-path>, which has its own
    # no-Shib + Lua-validated Location below. We exempt the no-Shib carve-
    # outs (they don't need this path) and the bypass prefix itself.
    RewriteCond %{HTTP_COOKIE} (^|;\s*)minerva_ext= [NC]
    RewriteCond %{REQUEST_URI} !^/__ext_proxy__/
    RewriteCond %{REQUEST_URI} !^/Shibboleth\.sso
    RewriteCond %{REQUEST_URI} !^/api/(integration|service|embed|external-auth|health)
    RewriteCond %{REQUEST_URI} !^/embed/
    RewriteCond %{REQUEST_URI} !^/lti
    RewriteCond %{REQUEST_URI} !^/assets
    RewriteCond %{REQUEST_URI} !^/favicon\.ico
    RewriteRule ^/(.*)$ /__ext_proxy__/$1 [PT,L]

    # WebSocket support (Shib path).
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteRule ^/?(.*) ws://127.0.0.1:30090/$1 [P,L]

    # ----- Default: Shibboleth (FIRST so carve-outs override it) ---------
    # Proxy declarations are pulled out to vhost scope (below) so they are
    # ordered explicitly relative to the /__ext_proxy__/ ProxyPassMatch.
    <Location />
        ShibUseHeaders On
        AuthType shibboleth
        ShibRequestSetting requireSession 1
        ShibRequestSetting requireSessionWith SU
        Require shib-user ~ @dsv\.su\.se$ @su\.se$
    </Location>

    # ----- Public (no-Shib) carve-outs -----------------------------------
    <Location /api/health>
        AuthType None
        ShibRequestSetting requireSession 0
        Require all granted
    </Location>

    <LocationMatch "^/api/(integration|service|embed|external-auth)">
        AuthType None
        ShibRequestSetting requireSession 0
        Require all granted
    </LocationMatch>

    <LocationMatch "^/embed/">
        AuthType None
        ShibRequestSetting requireSession 0
        Require all granted
    </LocationMatch>

    <Location /assets>
        AuthType None
        ShibRequestSetting requireSession 0
        Require all granted
    </Location>

    <Location /lti>
        AuthType None
        ShibRequestSetting requireSession 0
        Require all granted
    </Location>

    <Location /favicon.ico>
        AuthType None
        ShibRequestSetting requireSession 0
        Require all granted
    </Location>

    # ----- External-auth bypass: no Shib, mod_lua enforces auth ----------
    <LocationMatch "^/__ext_proxy__/">
        AuthType None
        ShibRequestSetting requireSession 0
        LuaHookAccessChecker /etc/apache2/lua/minerva-ext-auth.lua check_ext_auth
        Require all granted
    </LocationMatch>

    # ----- Proxy mappings (order matters: most-specific first) -----------
    # /__ext_proxy__/<path> -> backend/<path>  (strips the prefix)
    ProxyPassMatch "^/__ext_proxy__/(.*)$" "http://127.0.0.1:30090/$1"
    ProxyPassReverse /__ext_proxy__/ http://127.0.0.1:30090/
    # Catch-all for everything else (Shib path + carve-outs).
    ProxyPass / http://127.0.0.1:30090/
    ProxyPassReverse / http://127.0.0.1:30090/
</VirtualHost>
