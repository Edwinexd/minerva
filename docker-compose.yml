services:
  minerva:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - minerva-data:/data
    environment:
      - DATABASE_URL=postgres://minerva:minerva@postgres:5432/minerva
      - QDRANT_URL=http://qdrant:6334
      - CEREBRAS_API_KEY=${CEREBRAS_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - MINERVA_HMAC_SECRET=${MINERVA_HMAC_SECRET}
      - MINERVA_DOCS_PATH=/data/documents
      - MINERVA_ADMINS=${MINERVA_ADMINS}
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: minerva
      POSTGRES_PASSWORD: minerva
      POSTGRES_DB: minerva
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U minerva"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage

volumes:
  minerva-data:
  postgres-data:
  qdrant-data:
