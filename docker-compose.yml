services:
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    network_mode: host
    volumes:
      - minerva-data:/data
    environment:
      - DATABASE_URL=postgres://minerva:minerva@localhost:5432/minerva
      - QDRANT_URL=http://localhost:6334
      - CEREBRAS_API_KEY=${CEREBRAS_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - MINERVA_SERVICE_API_KEY=${MINERVA_SERVICE_API_KEY:-}
      - MINERVA_HMAC_SECRET=${MINERVA_HMAC_SECRET:-dev-secret-change-me}
      - MINERVA_DOCS_PATH=/data/documents
      - MINERVA_ADMINS=${MINERVA_ADMINS:-edsu8469}
      - MINERVA_DEV_MODE=true
      - MINERVA_BASE_URL=http://localhost:3000
      - MINERVA_DEV_PROXY=http://localhost:5173
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend-dev
    network_mode: host
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: minerva
      POSTGRES_PASSWORD: minerva
      POSTGRES_DB: minerva
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U minerva"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage

volumes:
  minerva-data:
  postgres-data:
  qdrant-data:
