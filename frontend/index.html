<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" sizes="any" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minerva</title>
    <script>
      // Resolve the theme BEFORE the first paint so the page doesn't
      // flash light-then-dark (or vice versa) on load. Mirrors the
      // logic in `src/lib/use-theme.ts`; if you change one, change the
      // other. Three modes: "light", "dark", "system" (default).
      // localStorage key matches `THEME_STORAGE_KEY` over there.
      (function () {
        try {
          var stored = localStorage.getItem("minerva-theme");
          var preferDark = window.matchMedia(
            "(prefers-color-scheme: dark)"
          ).matches;
          var resolved =
            stored === "light" || stored === "dark"
              ? stored
              : preferDark
                ? "dark"
                : "light";
          if (resolved === "dark") {
            document.documentElement.classList.add("dark");
          }
        } catch (_) {
          // localStorage / matchMedia unavailable (private mode, old
          // browser, SSR shim, ...). Default to light; the React-side
          // hook will re-resolve once it mounts.
        }
        // Resolve <html lang> before first paint so screen readers announce
        // the correct language immediately (WCAG 3.1.1). Mirrors the i18next
        // detector order (localStorage "minerva-language" first, then the
        // browser's navigator language). i18n keeps it in sync after mount
        // via its "languageChanged" listener. Supported langs match
        // SUPPORTED_LANGUAGES in src/i18n/index.ts.
        try {
          var SUPPORTED = ["en", "sv"];
          var storedLang = localStorage.getItem("minerva-language");
          var navLang = (navigator.language || "en").slice(0, 2);
          var lang =
            SUPPORTED.indexOf(storedLang) !== -1
              ? storedLang
              : SUPPORTED.indexOf(navLang) !== -1
                ? navLang
                : "en";
          document.documentElement.lang = lang;
        } catch (_) {
          // Defaults to the static lang="en" on <html>.
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
