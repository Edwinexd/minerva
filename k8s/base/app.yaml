apiVersion: apps/v1
kind: Deployment
metadata:
  name: minerva-app
  namespace: minerva
spec:
  replicas: 1
  strategy:
    # Recreate so we don't try to fit two api pods during the roll.
    type: Recreate
  selector:
    matchLabels:
      app: minerva-app
  template:
    metadata:
      labels:
        app: minerva-app
        # Phase 1 NetworkPolicy gate: only pods with this label can
        # reach the embedder/reranker ClusterIP services.
        minerva-internal-client: "true"
    spec:
      containers:
        - name: minerva
          image: ghcr.io/edwinexd/minerva:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: minerva-secrets
                  key: DATABASE_URL
            - name: QDRANT_URL
              value: "http://qdrant:6334"
            - name: MINERVA_HOST
              value: "0.0.0.0"
            - name: MINERVA_PORT
              value: "3000"
            - name: MINERVA_DOCS_PATH
              value: "/data/documents"
            # Post-split: api routes embed + rerank to the dedicated
            # pods via gRPC. No local FastEmbedder / FastReranker
            # cache is constructed, no model weights resident in this
            # pod, no HF_HOME mount needed.
            - name: MINERVA_EMBEDDER_URL
              value: "http://minerva-embedder.minerva.svc.cluster.local:50051"
            - name: MINERVA_RERANKER_URL
              value: "http://minerva-reranker.minerva.svc.cluster.local:50052"
            # Worker + schedulers run in their own pods; api doesn't
            # spawn them. Setting this `false` is the Phase 3 cutover
            # step from the design doc.
            - name: MINERVA_RUN_WORKER
              value: "false"
            - name: MINERVA_HMAC_SECRET
              valueFrom:
                secretKeyRef:
                  name: minerva-secrets
                  key: MINERVA_HMAC_SECRET
            - name: MINERVA_ADMINS
              valueFrom:
                secretKeyRef:
                  name: minerva-secrets
                  key: MINERVA_ADMINS
            - name: CEREBRAS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: minerva-secrets
                  key: CEREBRAS_API_KEY
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: minerva-secrets
                  key: OPENAI_API_KEY
            - name: MINERVA_SERVICE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: minerva-secrets
                  key: MINERVA_SERVICE_API_KEY
          volumeMounts:
            # Shared docs hostPath; api writes uploads + serves
            # downloads, worker / scheduler also mount it. See
            # docs/microservices-split.md "Persistent volumes".
            - name: app-data
              mountPath: /data
          resources:
            # Memory req == lim for Guaranteed QoS; we own memory
            # accounting ourselves. CPU is ranged: chat strategy +
            # axum + sqlx is mostly I/O-bound at steady state, but a
            # streaming chat reply with a busy LLM round trip + RAG
            # rerank + qdrant search can briefly burn most of a core.
            # Low req = scheduler-friendly; lim = burst headroom.
            # Post-split the api has no FastEmbedder / FastReranker
            # cache, no in-process worker, just HTTP + auth + chat
            # strategy + sqlx + qdrant + tonic clients. Steady state
            # ~500-600 MiB; 1 GiB gives slack for chat streaming +
            # memprobe + occasional spikes.
            requests:
              memory: "1Gi"
              cpu: "50m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 30
      volumes:
        - name: app-data
          hostPath:
            path: /data0/minerva/data
            type: DirectoryOrCreate
