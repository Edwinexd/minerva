apiVersion: apps/v1
kind: Deployment
metadata:
  name: minerva-app
  namespace: minerva
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minerva-app
  template:
    metadata:
      labels:
        app: minerva-app
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: minerva
          image: ghcr.io/edwinexd/minerva:master
          ports:
            - containerPort: 3000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: minerva-secrets
                  key: DATABASE_URL
            - name: QDRANT_URL
              value: "http://qdrant:6334"
            - name: MINERVA_HOST
              value: "0.0.0.0"
            - name: MINERVA_PORT
              value: "3000"
            - name: MINERVA_DOCS_PATH
              value: "/data/documents"
            - name: MINERVA_HMAC_SECRET
              valueFrom:
                secretKeyRef:
                  name: minerva-secrets
                  key: MINERVA_HMAC_SECRET
            - name: MINERVA_ADMINS
              valueFrom:
                secretKeyRef:
                  name: minerva-secrets
                  key: MINERVA_ADMINS
            - name: CEREBRAS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: minerva-secrets
                  key: CEREBRAS_API_KEY
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: minerva-secrets
                  key: OPENAI_API_KEY
          volumeMounts:
            - name: app-data
              mountPath: /data
          resources:
            requests:
              memory: "256Mi"
              cpu: "50m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 30
      volumes:
        - name: app-data
          hostPath:
            path: /data0/minerva/data
            type: DirectoryOrCreate
