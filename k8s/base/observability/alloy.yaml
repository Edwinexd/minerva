# Grafana Alloy: the log-shipping DaemonSet (Promtail's replacement;
# Promtail is in feature-freeze / wind-down, so a fresh build uses Alloy).
# It tails each pod's CRI log files off the node, attaches k8s labels, and
# pushes to Loki. Deliberately format-agnostic: it ships the raw log line
# with namespace/pod/container/app labels and does NOT try to parse JSON.
# The five services are a mix of JSON (embedder / reranker) and text
# (api / worker / scheduler) logs; structure is extracted at query time in
# Grafana (`| json | level="ERROR"`), so Alloy needs no per-service config
# and local-dev log formatting is untouched.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: alloy
  namespace: minerva
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: minerva-alloy
rules:
  - apiGroups: [""]
    resources: ["pods", "nodes"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: minerva-alloy
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: minerva-alloy
subjects:
  - kind: ServiceAccount
    name: alloy
    namespace: minerva
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: alloy-config
  namespace: minerva
data:
  config.alloy: |
    // Discover pods, then keep only those scheduled on THIS node (the
    // DaemonSet pod can only read its own node's log files). NODE_NAME is
    // injected via the downward API below.
    discovery.kubernetes "pods" {
      role = "pod"
    }

    discovery.relabel "pods" {
      targets = discovery.kubernetes.pods.targets

      rule {
        source_labels = ["__meta_kubernetes_pod_node_name"]
        regex         = sys.env("NODE_NAME")
        action        = "keep"
      }
      rule {
        source_labels = ["__meta_kubernetes_namespace"]
        target_label  = "namespace"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_name"]
        target_label  = "pod"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_container_name"]
        target_label  = "container"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_label_app"]
        target_label  = "app"
      }
      // CRI log path for this container: the pod UID is unique, so a glob
      // on it lands the right /var/log/pods/<ns>_<pod>_<uid>/<container>/ dir.
      rule {
        source_labels = ["__meta_kubernetes_pod_uid", "__meta_kubernetes_pod_container_name"]
        separator     = "/"
        action        = "replace"
        replacement   = "/var/log/pods/*$1/*.log"
        target_label  = "__path__"
      }
    }

    local.file_match "pods" {
      path_targets = discovery.relabel.pods.output
    }

    loki.source.file "pods" {
      targets    = local.file_match.pods.targets
      forward_to = [loki.process.cri.receiver]
    }

    // Strip the CRI envelope (timestamp / stream / flags), keep the raw
    // application line as the Loki entry. No JSON parsing here by design.
    loki.process "cri" {
      stage.cri {}
      forward_to = [loki.write.default.receiver]
    }

    loki.write "default" {
      endpoint {
        url = "http://loki:3100/loki/api/v1/push"
      }
    }
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: alloy
  namespace: minerva
  labels:
    app: alloy
    app.kubernetes.io/part-of: minerva-observability
spec:
  selector:
    matchLabels:
      app: alloy
  template:
    metadata:
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "12345"
        prometheus.io/path: "/metrics"
      labels:
        app: alloy
        app.kubernetes.io/part-of: minerva-observability
    spec:
      serviceAccountName: alloy
      tolerations:
        - operator: Exists
      containers:
        - name: alloy
          image: grafana/alloy:v1.5.1
          args:
            - run
            - /etc/alloy/config.alloy
            - --storage.path=/var/lib/alloy/data
            - --server.http.listen-addr=0.0.0.0:12345
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          ports:
            - containerPort: 12345
              name: http
          resources:
            requests:
              memory: "96Mi"
              cpu: "30m"
            limits:
              memory: "256Mi"
              cpu: "300m"
          volumeMounts:
            # The config.alloy from the alloy-config ConfigMap. Without
            # this mount, `alloy run /etc/alloy/config.alloy` falls back to
            # the image's default config and ships nothing to Loki.
            - name: config
              mountPath: /etc/alloy
              readOnly: true
            # Read-only access to the node's pod logs. /var/log covers both
            # /var/log/pods (the real files) and /var/log/containers (the
            # symlinks into them).
            - name: varlog
              mountPath: /var/log
              readOnly: true
            - name: alloy-data
              mountPath: /var/lib/alloy/data
      volumes:
        - name: config
          configMap:
            name: alloy-config
        - name: varlog
          hostPath:
            path: /var/log
        - name: alloy-data
          hostPath:
            # Persist read offsets across pod restarts so a roll doesn't
            # re-ship the tail of every log file.
            path: /var/lib/alloy-minerva
            type: DirectoryOrCreate
