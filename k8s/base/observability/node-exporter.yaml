# node-exporter: host-level CPU / memory / disk / filesystem metrics.
# DaemonSet (one per node; the cluster is single-node today but this is
# the correct shape). hostNetwork so the pod IP is the node IP and the
# generic `kubernetes-pods` scrape job reaches it on :9100.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: node-exporter
  namespace: minerva
  labels:
    app: node-exporter
    app.kubernetes.io/part-of: minerva-observability
spec:
  selector:
    matchLabels:
      app: node-exporter
  template:
    metadata:
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9100"
        prometheus.io/path: "/metrics"
      labels:
        app: node-exporter
        app.kubernetes.io/part-of: minerva-observability
    spec:
      hostNetwork: true
      hostPID: true
      securityContext:
        runAsUser: 65534
        runAsNonRoot: true
      tolerations:
        # Run on every node, including control-plane / tainted nodes.
        - operator: Exists
      containers:
        - name: node-exporter
          image: prom/node-exporter:v1.8.2
          args:
            - --path.procfs=/host/proc
            - --path.sysfs=/host/sys
            - --path.rootfs=/host/root
            - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($|/)
          ports:
            - containerPort: 9100
              name: metrics
          resources:
            requests:
              memory: "32Mi"
              cpu: "20m"
            limits:
              memory: "64Mi"
              cpu: "200m"
          volumeMounts:
            - name: proc
              mountPath: /host/proc
              readOnly: true
            - name: sys
              mountPath: /host/sys
              readOnly: true
            - name: root
              mountPath: /host/root
              mountPropagation: HostToContainer
              readOnly: true
      volumes:
        - name: proc
          hostPath:
            path: /proc
        - name: sys
          hostPath:
            path: /sys
        - name: root
          hostPath:
            path: /
