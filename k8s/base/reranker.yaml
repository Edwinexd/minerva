apiVersion: apps/v1
kind: Deployment
metadata:
  name: minerva-reranker
  namespace: minerva
spec:
  # Single replica for the same reason as the embedder: FastReranker
  # cache is per-pod.
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: minerva-reranker
  template:
    metadata:
      labels:
        app: minerva-reranker
        minerva-internal-client: "false"
    spec:
      containers:
        - name: reranker
          image: ghcr.io/edwinexd/minerva-reranker:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 50052
              name: grpc
          env:
            - name: MINERVA_RERANKER_HOST
              value: "0.0.0.0"
            - name: MINERVA_RERANKER_PORT
              value: "50052"
            - name: HF_HOME
              value: "/data/hf-cache"
            - name: RUST_LOG
              value: "info"
          volumeMounts:
            - name: hf-cache
              mountPath: /data
          resources:
            # Memory req == lim so the cgroup limit is fixed from
            # startup; see the comment on minerva-embedder for the full
            # reasoning. (CPU is ranged, so QoS is Burstable, not
            # Guaranteed - the memory floor is what we care about here.)
            #
            # 3 GiB. Measured in prod: the default jina-reranker-v2
            # base, once the model + ORT arena are warm, sits at
            # ~1.7 GiB process RSS *at idle* - already above the old
            # 1500Mi ceiling, so the pod OOMKilled (137) the instant a
            # real Rerank call faulted the model in, then CrashLooped:
            # every chat turn logged "rerank failed (transport error)"
            # and fell back to embedding order. 3 GiB leaves ~1.3 GiB
            # of headroom over the warm baseline for the cross-encoder
            # activation spike on the 30-80 candidate over-fetch batch,
            # plus room for one secondary benchmarked model resident.
            # Fits the node alongside everything else (node lands at
            # ~84% memory limits committed, MemoryPressure clear).
            #
            # Cross-encoder scoring is compute-bound per (query, doc)
            # pair; with the 30-80 candidate over-fetch a rerank burst
            # wants several cores. Idle between turns.
            requests:
              memory: "3Gi"
              cpu: "100m"
            limits:
              memory: "3Gi"
              cpu: "1500m"
          readinessProbe:
            tcpSocket:
              port: 50052
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 50052
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: hf-cache
          hostPath:
            path: /data0/minerva/hf-cache-rerank
            type: DirectoryOrCreate
