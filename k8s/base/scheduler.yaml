apiVersion: apps/v1
kind: Deployment
metadata:
  name: minerva-scheduler
  namespace: minerva
spec:
  # Single replica by design: the periodic loops use "find what's
  # due" DB queries that tolerate two callers, but running one
  # replica avoids the dupe-work cost and matches the simplest
  # cron-style operational model. See docs/microservices-split.md
  # "Periodic tasks: where do they live".
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: minerva-scheduler
  template:
    metadata:
      labels:
        app: minerva-scheduler
        # Talks to embedder/reranker through the same NetworkPolicy
        # gate as the worker; the Canvas auto-sync codepath uses the
        # same ingest pipeline so we keep the option open even though
        # the scheduler itself doesn't call embed directly.
        minerva-internal-client: "true"
    spec:
      containers:
        - name: scheduler
          image: ghcr.io/edwinexd/minerva-scheduler:latest
          imagePullPolicy: Always
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: minerva-secrets
                  key: DATABASE_URL
            - name: QDRANT_URL
              value: "http://qdrant:6334"
            # No HTTP listener; placeholder values just to satisfy
            # Config::from_env, which the AppState construction reads.
            - name: MINERVA_HOST
              value: "0.0.0.0"
            - name: MINERVA_PORT
              value: "0"
            - name: MINERVA_DOCS_PATH
              value: "/data/documents"
            - name: MINERVA_EMBEDDER_URL
              value: "http://minerva-embedder.minerva.svc.cluster.local:50051"
            - name: MINERVA_RERANKER_URL
              value: "http://minerva-reranker.minerva.svc.cluster.local:50052"
            - name: MINERVA_HMAC_SECRET
              valueFrom:
                secretKeyRef:
                  name: minerva-secrets
                  key: MINERVA_HMAC_SECRET
            - name: MINERVA_ADMINS
              valueFrom:
                secretKeyRef:
                  name: minerva-secrets
                  key: MINERVA_ADMINS
            - name: CEREBRAS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: minerva-secrets
                  key: CEREBRAS_API_KEY
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: minerva-secrets
                  key: OPENAI_API_KEY
            - name: MINERVA_SERVICE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: minerva-secrets
                  key: MINERVA_SERVICE_API_KEY
          volumeMounts:
            # Canvas auto-sync writes files to /data/documents via
            # routes::canvas::run_sync, the same codepath the admin
            # uses interactively. See docs/microservices-split.md
            # "/data/documents - shared between api, worker, scheduler".
            - name: app-data
              mountPath: /data
          resources:
            # req == lim for Guaranteed QoS; see the comment on
            # minerva-embedder. 256 MiB easily covers the steady
            # ~50-80 MiB (sqlx pool + reqwest pool + tokio runtime)
            # plus the per-tick Canvas / NRPS allocation spikes.
            # Memory req == lim for Guaranteed QoS; CPU ranged.
            # 4 periodic loops are normally idle but Canvas auto-sync
            # can briefly use a core when downloading + parsing a
            # large batch of materials.
            requests:
              memory: "256Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "500m"
      volumes:
        - name: app-data
          hostPath:
            path: /data0/minerva/data
            type: DirectoryOrCreate
